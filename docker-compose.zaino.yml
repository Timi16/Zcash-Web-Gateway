# =============================================================================
# Zcash Web Gateway — Zaino upstream override (laptop test mode)
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.zaino.yml up
#
# Points gateway at an external public Zaino endpoint.
# No local zebrad node required.
#
# Zaino exposes two ports:
#   8137 — ZIP-307 gRPC  (what the gateway proxies)
#   8232 — JSON-RPC      (NOT proxied — out of scope)
#
# =============================================================================

services:

  gateway:
    # depends_on removed — no local Zaino container to wait for
    environment:
      UPSTREAM_HOST: ${UPSTREAM_HOST:-zaino.zfnd.org}
      UPSTREAM_PORT: ${UPSTREAM_PORT:-8137}