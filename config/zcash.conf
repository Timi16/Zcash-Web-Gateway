# =============================================================================
# zcash.conf — lightwalletd RPC connection config (regtest)
# =============================================================================
#
# Tells lightwalletd where to find the Zcash node's JSON-RPC endpoint.
# In the regtest Docker Compose stack, the node is zebrad on the internal
# Docker network at hostname "zebrad", port 18232.
#
# lightwalletd reads this file via --zcash-conf-path /conf/zcash.conf
#
# =============================================================================

regtest=1

# Zebrad hostname on the Docker internal network (service name in compose)
rpcbind=zebrad
rpcport=18232

# Zebrad in the Docker internal network does not require RPC credentials.
# These dummy values satisfy lightwalletd's parser — they are not validated
# by zebrad when connecting from within the same Docker network.
rpcuser=lightwalletd
rpcpassword=lightwalletd
