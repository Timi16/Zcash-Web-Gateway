# =============================================================================
# zcash.conf — lightwalletd configuration
# =============================================================================
#
# Location inside container: /etc/lightwalletd/zcash.conf
# Mounted read-only via docker-compose.yml volumes block.
#
# This file tells lightwalletd how to connect to a zcashd / zebrad node.
# lightwalletd does NOT connect to the Zcash p2p network directly — it
# speaks JSON-RPC to a fully synced node and indexes compact block data
# from it.
#
# Setup options:
#
#   Option A — Use your own local zcashd node (full control, best privacy)
#     Set rpcbind, rpcport, rpcuser, rpcpassword to your node's values.
#
#   Option B — Use a trusted remote node (easier setup, less control)
#     Set rpcconnect to the remote node's address.
#     Only do this over a private/trusted network or VPN.
#
#   Option C — Use Zebra (zebrad) instead of zcashd
#     Zebra implements the same JSON-RPC interface for lightwalletd.
#     Set rpcconnect to your zebrad node address.
#     Zebra default RPC port: 8232
#
# Testnet:
#   Uncomment the testnet=1 line and adjust rpcport to 18232.
#
# =============================================================================


# -----------------------------------------------------------------------------
# Network
# -----------------------------------------------------------------------------

# Mainnet is the default. Uncomment to use testnet instead.
# testnet=1


# -----------------------------------------------------------------------------
# RPC connection — how lightwalletd reaches zcashd / zebrad
# -----------------------------------------------------------------------------

# Address of the zcashd / zebrad node.
# Default: 127.0.0.1 (same host)
# For docker compose: use the service name (e.g. "zebrad" or "zcashd")
rpcconnect=127.0.0.1

# JSON-RPC port.
# zcashd mainnet:  8232
# zcashd testnet:  18232
# zebrad mainnet:  8232
rpcport=8232

# RPC credentials — must match what zcashd / zebrad is configured with.
# Use a long random string for rpcpassword in production.
# Generate one: openssl rand -hex 32
rpcuser=zcashrpc
rpcpassword=4e8f2a1b9c3d7e5f0a6b2c8d4e9f1a0b3c7d5e2f6a8b0c4d9e1f3a7b5c0d2e6f


# RPC connection timeout in seconds.
# Increase if your node is slow to respond during initial sync.
rpctimeout=30

# Maximum number of concurrent RPC connections to the node.
# lightwalletd issues multiple RPC calls in parallel when catching up.
rpcworkqueue=32


# -----------------------------------------------------------------------------
# lightwalletd behaviour
# -----------------------------------------------------------------------------

# How many blocks lightwalletd fetches from the node per batch.
# Higher values speed up initial sync at the cost of more memory.
# Default: 10
# Recommended for production: 100
# Lower if you see OOM errors during sync.
# lightwalletd.cache-size=100


# -----------------------------------------------------------------------------
# TLS — node connection
# -----------------------------------------------------------------------------

# zcashd uses a self-signed TLS cert for its RPC interface by default.
# lightwalletd verifies it using the CA bundle below.
#
# For local / docker-compose setups where zcashd is on the same private
# network, it is acceptable to disable TLS verification.
# In production with a remote node, always verify TLS.
#
# To disable verification (local dev only):
# rpcssl=0
#
# To specify a custom CA cert:
# rpcsslcertificatechainfile=/path/to/ca.crt


# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# Log level: debug | info | warn | error
# Use "info" in production. Use "debug" when diagnosing issues.
# lightwalletd outputs structured JSON logs to stdout — picked up by Docker.
# loglevel=info


# =============================================================================
# Quick-start checklist
# =============================================================================
#
# Before running docker compose up:
#
#   [ ] Replace rpcpassword with a strong random value
#       openssl rand -hex 32
#
#   [ ] Confirm rpcconnect points at your node
#       - Same host:      127.0.0.1
#       - Docker compose: use the zcashd/zebrad service name
#       - Remote node:    IP or hostname (use VPN or private network)
#
#   [ ] Confirm rpcport matches your node
#       - zcashd mainnet:  8232
#       - zcashd testnet:  18232
#
#   [ ] Confirm rpcuser matches your node's rpcuser
#
#   [ ] If using testnet, uncomment testnet=1 and update rpcport to 18232
#
# =============================================================================