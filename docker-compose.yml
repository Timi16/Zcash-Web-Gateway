# =============================================================================
# Zcash Web Gateway — Docker Compose
# =============================================================================
#
# Usage:
#   cp .env.example .env
#   docker compose up
#
# Points at an external public lightwalletd endpoint.
# No local zcashd / zebrad node required.
#
# Health check:
#   curl http://localhost:8080/healthz
#
# =============================================================================

services:

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: zcash-web-gateway:dev
    container_name: zcash-gateway

    ports:
      - "${GATEWAY_PORT:-8080}:8080"
      # Uncomment for local admin debugging only:
      # - "127.0.0.1:9901:9901"

    environment:
      UPSTREAM_HOST: ${UPSTREAM_HOST:-mainnet.lightwalletd.com}
      UPSTREAM_PORT: ${UPSTREAM_PORT:-9067}

    volumes:
      - ./gateway/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./gateway/cors.yaml:/etc/envoy/cors.yaml:ro

    # depends_on removed — no local upstream service to wait for

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

    restart: unless-stopped

    networks:
      - gateway_net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  gateway_net:
    driver: bridge
    internal: false